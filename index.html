<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v13.4</title>
    <link rel="icon" href="assets/img/icon-192.png">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .tile { border: 1px solid #0078D4; padding: 15px; text-align: center; border-radius: 8px; background: rgba(0,120,212,0.1); }
        .tile img { display: block; margin: 0 auto 10px; }
        .tile-label { font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="tile" onclick="loadModule('stok')">
            <img src="assets/img/icon-192.png" width="45" alt="Gudang">
            <span class="tile-label">Gudang</span>
        </div>
        <div class="tile" onclick="loadModule('booking')">
            <img src="assets/img/icon-192.png" width="45" alt="Booking">
            <span class="tile-label">Booking</span>
        </div>
        <div class="tile" onclick="loadModule('security')">
            <img src="assets/img/icon-192.png" width="45" alt="Security">
            <span class="tile-label">Security</span>
        </div>
    </div>
    <script src="js/app-core.js"></script>
</body>
</html>
