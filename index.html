<!DOCTYPE html>
<html lang="id" data-theme="dark" data-prayer="dzuhur" data-performance="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="description" content="Dream OS 2026 Series Pro - Smart Automation & Asset Management">
    
    <title>Dream OS 2026 Pro | The Power Soul of Shalawat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/dream-engine-2026.css">
</head>

<body class="bg-dynamic-prayer overflow-hidden antialiased selection:bg-emerald-500 selection:text-white">

    <div id="architect-stealth-layer" class="fixed inset-0 z-[9999] pointer-events-none"></div>

    <div id="app-shell" class="relative flex flex-col h-[100dvh] w-full max-w-md mx-auto shadow-2xl overflow-hidden glass-wrapper">
        
        <header class="glass-header z-50 flex flex-col px-4 pt-6 pb-3 border-b border-emerald-500/20 backdrop-blur-md">
            <div class="flex justify-between items-center text-xs text-emerald-400/80 mb-2 font-mono">
                <span id="prayer-monitor" class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Sync: <span data-i18n="time.current">Dzuhur 12:05 WIB</span>
                </span>
                <span id="system-status">ISO 27001 | <span id="batt-level">100%</span></span>
            </div>
            
            <div class="text-center drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                <h1 class="font-arabic text-3xl text-emerald-50 text-glow tracking-wider mb-1" data-i18n="header.bismillah">
                    
                    ﻿بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ

                </h1>
                <h2 class="font-arabic text-xl text-emerald-400" data-i18n="header.shalawat">
                    اَللهم صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ

                </h2>
            </div>
        </header>

        <main id="core-module-container" class="flex-1 overflow-y-auto scroll-smooth z-30 p-4 pb-28">
            <div id="dynamic-stage" class="transition-all duration-500 ease-in-out opacity-0">
                <p class="text-center text-emerald-500/50 font-mono text-sm mt-10">Initializing Core Modules...</p>
            </div>
        </main>

        <div class="absolute bottom-20 left-1/2 transform -translate-x-1/2 z-50">
            <button id="btn-magic-ai" class="relative group outline-none hover:scale-105 transition-transform">
                <div class="absolute inset-0 bg-emerald-500 rounded-full blur-md opacity-50 group-hover:opacity-100 transition-opacity"></div>
                <img src="assets/icon-gold-ha.png" alt="AI Core" class="relative w-16 h-16 drop-shadow-2xl rotating-magic">
            </button>
        </div>

        <footer class="glass-footer absolute bottom-0 w-full z-40 pb-safe pt-2 px-2 border-t border-emerald-500/20 backdrop-blur-xl">
            <nav class="grid grid-cols-5 gap-1">
                <button class="nav-item active flex flex-col items-center p-2 rounded-xl transition-colors hover:bg-emerald-500/10" onclick="DREAM.load('home')">
                    <span class="text-xl mb-1">🧭</span>
                    <span class="text-[10px] font-semibold text-emerald-50" data-i18n="nav.Home">Home</span>
                </button>
                <button class="nav-item flex flex-col items-center p-2 rounded-xl transition-colors hover:bg-emerald-500/10" onclick="DREAM.load('vpn')">
                    <span class="text-xl mb-1">🛡️</span>
                    <span class="text-[10px] font-semibold text-slate-400" data-i18n="nav.Camera">Camera</span>
                </button>
                <div class="w-full"></div> 
                <button class="nav-item flex flex-col items-center p-2 rounded-xl transition-colors hover:bg-emerald-500/10" onclick="DREAM.load('wallet')">
                    <span class="text-xl mb-1">💳</span>
                    <span class="text-[10px] font-semibold text-slate-400" data-i18n="nav.Qrscanner">QrScanner</span>
                </button>
                <button class="nav-item flex flex-col items-center p-2 rounded-xl transition-colors hover:bg-emerald-500/10" onclick="DREAM.load('settings')">
                    <span class="text-xl mb-1">⚙️</span>
                    <span class="text-[10px] font-semibold text-slate-400" data-i18n="nav.settings">Settings</span>
                </button>
            </nav>
        </footer>

    </div>

    <script type="module" src="js/dream-core.js"></script>
    <script type="module" src="js/ai-orchestrator.js"></script>
</body>
</html>
