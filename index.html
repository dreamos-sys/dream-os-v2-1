<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 - Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --emerald: #10b981; --gold: #eab308; }
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Header Sakral */
        .holy-header { background: linear-gradient(to bottom, #064e3b 0%, #020617 100%); padding: 25px 0; text-align: center; }
        .bismillah { font-family: 'Amiri', serif; font-size: 24px; color: white; }
        .shalawat { font-size: 13px; color: var(--emerald); margin: 5px 0; }
        
        /* Floating Nav Base 44 */
        .nav-dock {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-around;
            border-top: 1px solid #e2e8f0; z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--emerald); }
        .nav-btn i { font-size: 20px; margin-bottom: 4px; }

        /* The Golden D Button (QR & Architect Access) */
        .gold-trigger { position: relative; top: -30px; }
        .gold-icon {
            width: 70px; height: 70px; background: white; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .gold-icon img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <header class="holy-header">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="shalawat">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ وَعَلٰى اٰلِ سَيِّدِنَا مُحَمَّدٍ</div>
        <div class="text-[9px] tracking-[4px] opacity-50" id="ghost-mode-trigger">THE POWER SOUL OF SHALAWAT</div>
    </header>

    <main id="app-viewport" class="min-h-screen pb-32"></main>

    <nav class="nav-dock">
        <div class="nav-btn" onclick="DREAM.load('home')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-btn" onclick="DREAM.load('k3-officer')"><i class="fa-solid fa-shield-halved"></i><span>K3</span></div>
        
        <div class="gold-trigger" onclick="DREAM.load('qr')">
            <div class="gold-icon"><img src="1001075663.png"></div>
            <div class="text-center text-[9px] font-black text-emerald-600 mt-2">QR SCAN</div>
        </div>

        <div class="nav-btn" onclick="DREAM.load('command-center')"><i class="fa-solid fa-chart-pie"></i><span>CMD</span></div>
        <div class="nav-btn" onclick="DREAM.load('settings')"><i class="fa-solid fa-microchip"></i><span>Sys</span></div>
    </nav>

    <script src="shell.js" type="module"></script>
</body>
</html>
