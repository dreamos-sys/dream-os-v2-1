    <!-- SEO & Meta -->
    <title>Dream OS 2026 Enterprise</title>
    <meta name="description" content="Smart Facility Management Platform">
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: dark)">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dream OS 2026">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    
    <!-- Icons & Manifest -->

    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">

    <!-- Critical CSS (minimal) -->
    <style>
        :root {
            --color-primary: #10b981;
            --color-bg: #020617;
            --color-text: #e2e8f0;
            --color-text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-blur: blur(24px) saturate(180%);
            --glass-border: 1px solid rgba(16, 185, 129, 0.2);
            --font-sans: 'Inter', sans-serif;
            --font-arabic: 'Amiri', serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-sans); background:var(--color-bg); color:var(--color-text); }
        .app-shell { max-width:480px; margin:0 auto; }
        .glass-header { background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-bottom:var(--glass-border); }
        .bismillah { font-family:var(--font-arabic); color:var(--color-primary); }
        .shalawat { font-family:var(--font-arabic); color:var(--color-primary); opacity:0.9; }
        #loading-screen { position:fixed; inset:0; background:var(--color-bg); display:flex; align-items:center; justify-content:center; z-index:10000; }
        #loading-screen.hidden { opacity:0; pointer-events:none; transition:opacity 0.5s; }
        .loader { width:60px; height:60px; border:4px solid rgba(16,185,129,0.2); border-top-color:#10b981; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .toast { background:rgba(15,23,42,0.95); backdrop-filter:blur(20px); border:1px solid rgba(16,185,129,0.3); border-radius:12px; padding:1rem; margin-bottom:8px; color:var(--color-text); }
    </style>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="core/engine.css">
    
    <!-- Preload -->
    <link rel="modulepreload" href="js/dream-global.js">
    <link rel="modulepreload" href="js/dream-core.js">
    <link rel="modulepreload" href="js/ai-orchestrator.js">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div style="text-align:center;">
            <div class="loader"></div>
            <p style="margin-top:1rem;color:var(--color-text-muted);">Initializing Dream OS...</p>
            <p class="font-arabic" style="color:var(--color-primary);">بِسْمِ اللَّهِ</p>
        </div>
    </div>

    <!-- ERROR BOUNDARY -->
    <div id="error-boundary" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,0.95);z-index:9999;align-items:center;justify-content:center;padding:2rem;">
        <div style="max-width:400px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:16px;padding:2rem;text-align:center;">
            <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
            <h3 style="font-size:1.25rem;font-weight:700;color:#ef4444;margin-bottom:0.5rem;">System Error</h3>
            <p id="error-message" style="font-size:0.875rem;color:var(--color-text-muted);margin-bottom:1.5rem;">An unexpected error occurred</p>
            <button onclick="location.reload()" style="background:var(--color-primary);color:var(--color-bg);padding:0.75rem 1.5rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;">
                Reload Application
            </button>
        </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-shell" class="app-shell">
        <header id="app-header" class="glass-header">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 1rem;">
                <div style="display:flex;gap:1rem;">
                    <span id="prayer-time-display">Dzuhur 12:05</span>
                    <span id="network-type">4G</span>
                </div>
                <div>
                    <span id="battery-level">100%</span>
                </div>
            </div>
            <div class="islamic-header" style="text-align:center;padding:1rem;">
                <h1 class="bismillah">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</h1>
                <h2 class="shalawat">اَللهم صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ</h2>
            </div>
            <div id="breadcrumb-container" class="hidden" style="padding:0 1rem 0.5rem;color:var(--color-text-muted);font-size:0.75rem;">
                <span id="current-module-name">Dashboard</span>
            </div>
        </header>

        <main id="core-module-container" style="flex:1;overflow-y:auto;padding:1rem;padding-bottom:calc(80px + env(safe-area-inset-bottom));">
            <div id="dynamic-stage">
                <div style="text-align:center;padding:5rem 0;">
                    <i class="fas fa-cog fa-spin" style="color:var(--color-primary);font-size:1.5rem;"></i>
                    <p style="color:var(--color-primary);opacity:0.7;">Loading modules...</p>
                </div>
            </div>
        </main>

        <!-- FLOATING AI BUTTON -->
        <div style="position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:1000;text-align:center;">
            <div style="background:var(--color-primary);color:white;padding:0.25rem 0.75rem;border-radius:999px;font-size:0.75rem;margin-bottom:0.5rem;">🤖 Tanya AI</div>
            <button id="btn-magic-ai" style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#10b981,#06b6d4);border:3px solid rgba(255,255,255,0.2);cursor:pointer;font-size:1.75rem;" onclick="window.openAIPanel()">
                🤖
            </button>
        </div>

        <!-- BOTTOM NAV -->
        <footer style="background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border-top:1px solid rgba(16,185,129,0.2);position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));">
            <nav style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;">
                <button class="nav-item active" data-module="home" onclick="DREAM.load('home')">🏠<span style="font-size:0.65rem;">Home</span></button>
                <button class="nav-item" data-module="sekuriti" onclick="DREAM.load('sekuriti')">🛡️<span style="font-size:0.65rem;">Security</span></button>
                <button class="nav-item" data-module="qr" onclick="DREAM.load('qr')">📷<span style="font-size:0.65rem;">Scanner</span></button>
                <button class="nav-item" data-module="settings" onclick="DREAM.load('settings')">⚙️<span style="font-size:0.65rem;">Settings</span></button>
            </nav>
        </footer>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" style="position:fixed;top:1rem;right:1rem;z-index:3000;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;max-width:320px;"></div>

    <!-- ════════════════════════════════════════════

    <script>
        // Pastikan showToast didefinisikan SEBELUM digunakan
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) { console.log('[TOAST]', message, type); return; }
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, duration);
        }

        window.DREAM = {
            version: '2026.1.0',
            env: 'production',
            
            config: {
                modules: {
                    'home': './modules/home/module.js',
                    'sekuriti': './modules/sekuriti/module.js',
                    'qr': './modules/qr/module.js',
                    'settings': './modules/settings/module.js',
                    'ghost': './modules/ghost/module.js',
                    'ai-panel': './modules/ai-panel/module.js',
                    'login': './modules/login/module.js'  // ← SUDAH ADA!
                },
                supabase: { 
                    url: 'https://pvznaeppaagylwddirla.supabase.co', 
                    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo' 
                }
            },
            
            state: {
                currentModule: 'home',
                user: null,
                session: null,
                networkStatus: navigator.onLine,
                theme: 'dark',
                language: 'id'
            },
            
            modules: new Map(),
            cache: new Map(),
            
            // Definisi FUNGSI yang benar
            load: function(moduleName) {
                console.log('[DREAM.load]', moduleName);
                if (window.app && typeof window.app.loadModule === 'function') {
                    return window.app.loadModule(moduleName);
                }
                console.warn('[DREAM] App not initialized yet');
            },
            
            showToast: showToast,  // ← Gunakan fungsi yang sudah didefinisikan
            
            trackEvent: function(eventName, data = {}) {
                console.log('[ANALYTICS]', eventName, data);
            },
            
            utils: {
                log: function(level, message) {
                    const logs = JSON.parse(localStorage.getItem('dreamos-logs') || '[]');
                    logs.push({ timestamp: new Date().toISOString(), level, message });
                    if (logs.length > 1000) logs.shift();
                    localStorage.setItem('dreamos-logs', JSON.stringify(logs));
                    console.log(`[${level}] ${message}`);
                },
                clearCache: function() {
                    if ('caches' in window) {
                        caches.keys().then(names => names.forEach(name => caches.delete(name)));
                    }
                    showToast('Cache cleared', 'success');  // ← PAKAI showToast langsung
                }
            }
        };
        
        console.log('✅ [DREAM] Global object ready');
        console.log('🔐 Login module:', window.DREAM.config.modules.login);
        
        window.openAIPanel = function() {
            if (window.DREAM && window.DREAM.load) {
                window.DREAM.load('ai-panel');
                window.DREAM.showToast('🤖 Membuka AI Panel...', 'info');
            }
        };
    </script>

    <!-- Ghost Mode Activation (5 taps) -->
    <script>
        (function() {
            let tapCount = 0;
            const header = document.getElementById('app-header');
            if (header) {
                header.addEventListener('click', () => {
                    tapCount++;
                    if (tapCount === 5) {
                        tapCount = 0;
                        const pwd = prompt('👻 Developer access:');
                        if (pwd === 'dreamos2026') {
                            if (window.DREAM && window.DREAM.load) {
                                window.DREAM.load('login');
                            }
                        } else {
                            alert('Access denied');
                        }
                    }
                    setTimeout(() => tapCount = 0, 3000);
                });
            }
        })();
    </script>

    <!-- Error Handler -->
    <script>
        window.addEventListener('error', (event) => {
            console.error('[ERROR]', event.error);
            const errorBoundary = document.getElementById('error-boundary');
            const errorMessage = document.getElementById('error-message');
            if (errorBoundary && errorMessage) {
                errorMessage.textContent = event.error?.message || 'Unknown error';
                errorBoundary.style.display = 'flex';
            }
            if (window.DREAM?.utils) {
                window.DREAM.utils.log('ERROR', event.error?.message || 'Unknown');
            }
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('[REJECTION]', event.reason);
        });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(() => loading.remove(), 500);
                }
            }, 1000);
        });
    </script>

    <!-- Utilities -->
    <script src="js/utils/prayer-time.js" defer></script>
    <script src="js/utils/network-monitor.js" defer></script>
    <script src="js/utils/battery-monitor.js" defer></script>
    <script src="js/utils/storage.js" defer></script>
