<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 - Sovereign GOLD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-deep: #020617; --emerald: #10b981; --gold: #eab308; --slate: #94a3b8; }
        body { margin: 0; background: var(--bg-deep); font-family: 'Segoe UI', sans-serif; color: white; }

        /* Header Sakral Base 44 Style */
        .header-v21 { 
            background: linear-gradient(180deg, #064e3b 0%, var(--bg-deep) 100%);
            padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(16, 185, 129, 0.2);
        }
        .bismillah { color: #fff; font-size: 22px; font-family: serif; text-shadow: 0 0 10px var(--emerald); }
        .shalawat { color: rgba(255,255,255,0.9); font-size: 13px; margin: 10px 0; line-height: 1.5; }
        .sys-ver { font-size: 10px; letter-spacing: 2px; color: var(--emerald); font-weight: bold; }

        /* Floating Nav Base 44 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-around;
            border-top: 1px solid #e2e8f0; z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 10px; font-weight: 600; cursor: pointer; width: 60px; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: var(--emerald); }

        /* The Golden D - All in One QR */
        .nav-center-gold { position: relative; top: -25px; }
        .gold-d-btn {
            width: 70px; height: 70px;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid #fff; cursor: pointer;
        }
        .gold-d-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <header class="header-v21">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="shalawat">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ وَعَلٰى اٰلِ سَيِّدِنَا مُحَمَّدٍ</div>
        <div class="sys-ver">DREAM OS v2.1 • ARCHITECT MODE</div>
    </header>

    <main id="root-viewport" style="padding-bottom: 100px;"></main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.DREAM.load('home')">
            <i class="fa-solid fa-house-chimney"></i><span>Home</span>
        </div>
        <div class="nav-item" onclick="window.DREAM.load('k3')">
            <i class="fa-solid fa-shield-heart"></i><span>Laporan</span>
        </div>
        
        <div class="nav-center-gold" onclick="window.DREAM.load('qr-scanner')">
            <div class="gold-d-btn">
                <img src="1001075663.png" alt="D Gold">
            </div>
            <div style="text-align:center; color:#10b981; font-size:10px; font-weight:800; margin-top:5px;">SCAN QR</div>
        </div>

        <div class="nav-item" onclick="window.DREAM.load('asset')">
            <i class="fa-solid fa-chart-simple"></i><span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.DREAM.load('settings')">
            <i class="fa-solid fa-user-gear"></i><span>Admin</span>
        </div>
    </nav>

    <script src="shell.js" type="module"></script>
</body>
</html>
