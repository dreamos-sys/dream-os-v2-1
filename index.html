<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v13.6 - Sovereign LUX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-card: #1e293b;
            --emerald: #10b981;
            --slate-text: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            color: white;
            height: 100%;
        }

        /* Ghost Header Trigger - Tersembunyi tapi Aktif */
        #ghost-header-trigger {
            position: fixed; top: 0; right: 0;
            width: 80px; height: 80px;
            z-index: 999999;
            background: transparent;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Loader System */
        #system-loader {
            position: fixed; inset: 0;
            background: var(--bg-deep);
            z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader-content { text-align: center; }
        .bismillah { font-size: 12px; color: var(--emerald); letter-spacing: 2px; margin-bottom: 10px; opacity: 0.8; }
        .logo-text { font-size: 24px; font-weight: 900; letter-spacing: 5px; color: white; margin: 0; }
        .loader-bar {
            width: 100px; height: 2px; background: #1e293b;
            margin: 20px auto; position: relative; overflow: hidden;
        }
        .loader-bar::after {
            content: ''; position: absolute; left: -100%; width: 100%; height: 100%;
            background: var(--emerald); animation: loading 1.5s infinite;
        }
        @keyframes loading { 100% { left: 100%; } }

        /* Floating Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            height: 70px; background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            display: none; /* Akan diubah shell.js menjadi flex */
            align-items: center; justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--slate-text); font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--emerald); }

        /* Tombol Shalawat Tengah */
        .nav-center {
            position: relative; top: -25px;
        }
        .shalawat-btn {
            width: 65px; height: 65px;
            background: var(--emerald);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            border: 5px solid var(--bg-deep);
            cursor: pointer; transition: 0.3s active;
        }
        .shalawat-btn:active { transform: scale(0.9); }

        main#root-viewport {
            min-height: 100vh;
            padding-bottom: 100px; /* Ruang untuk nav */
        }
    </style>
</head>
<body>

    <div id="ghost-header-trigger"></div>

    <div id="system-loader">
        <div class="loader-content">
            <div class="bismillah">BISMILLAH BI IDZNILLAH</div>
            <h1 class="logo-text">DREAM OS</h1>
            <div class="loader-bar"></div>
        </div>
    </div>

    <main id="root-viewport"></main>

    <nav class="bottom-nav" id="main-nav">
        <div class="nav-item active" onclick="window.DREAM.load('home')">
            <i class="fa-solid fa-house"></i><span>Home</span>
        </div>
        <div class="nav-item" onclick="window.DREAM.load('k3')">
            <i class="fa-solid fa-triangle-exclamation"></i><span>K3</span>
        </div>
        
        <div class="nav-center" onclick="window.DREAM.haptic(100)">
            <div class="shalawat-btn">صلوات</div>
        </div>

        <div class="nav-item" onclick="window.DREAM.load('asset')">
            <i class="fa-solid fa-boxes-stacked"></i><span>Aset</span>
        </div>
        <div class="nav-item" onclick="window.DREAM.load('settings')">
            <i class="fa-solid fa-gear"></i><span>Sistem</span>
        </div>
    </nav>

    <script>
        // Mencegah stuck logo jika shell gagal
        setTimeout(() => {
            const loader = document.getElementById('system-loader');
            if (loader && loader.style.display !== 'none') {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('main-nav').style.display = 'flex';
                }, 500);
            }
        }, 3000);
    </script>

    <script src="shell.js" type="module"></script>
</body>
</html>
